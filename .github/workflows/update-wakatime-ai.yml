name: Update AI dashboard

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - README.md
      - scripts/update_wakatime_ai.py
      - .github/workflows/update-wakatime-ai.yml
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Render dashboard
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          AI_DASHBOARD_AI_CHANGES: ${{ vars.AI_DASHBOARD_AI_CHANGES }}
          AI_DASHBOARD_TOKENS: ${{ vars.AI_DASHBOARD_TOKENS }}
          AI_DASHBOARD_INPUT_TOKENS: ${{ vars.AI_DASHBOARD_INPUT_TOKENS }}
          AI_DASHBOARD_OUTPUT_TOKENS: ${{ vars.AI_DASHBOARD_OUTPUT_TOKENS }}
          AI_DASHBOARD_TOP_AGENT: ${{ vars.AI_DASHBOARD_TOP_AGENT }}
          AI_DASHBOARD_MODEL_MIX: ${{ vars.AI_DASHBOARD_MODEL_MIX }}
          AI_DASHBOARD_SOURCE_LABEL: ${{ vars.AI_DASHBOARD_SOURCE_LABEL }}
        run: python3 scripts/update_wakatime_ai.py

      - name: Commit dashboard changes
        run: |
          if git diff --quiet README.md; then
            echo "No dashboard changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update AI dashboard"
          git push
