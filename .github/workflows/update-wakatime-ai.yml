name: Update WakaTime AI metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Update README metrics
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
        run: python3 scripts/update_wakatime_ai.py

      - name: Commit profile dashboard changes
        run: |
          if git diff --quiet README.md assets/ai-native-dashboard.svg; then
            echo "No profile dashboard changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/ai-native-dashboard.svg
          git commit -m "chore: update AI dashboard"
          git push
