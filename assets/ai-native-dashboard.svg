<svg width="2400" height="1400" viewBox="0 0 1200 700" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" preserveAspectRatio="xMidYMid meet" text-rendering="geometricPrecision" shape-rendering="geometricPrecision">
  <title id="title">AI-native engineering dashboard</title>
  <desc id="desc">Agentic engineering telemetry dashboard for Marko Miric.</desc>
  <defs>
